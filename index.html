<!-- Polje za vnos kode -->
<div id="vip-sekcija">
  <input type="text" id="vip-koda" placeholder="Vnesi VIP kodo">
  <button onclick="preveriKodo()">Odkleni glasbeno željo</button>
</div>

<!-- Gumb za glasbeno željo (skrit po privzetem) -->
<div id="glasbena-zelja-sekcija" style="display: none;">
  <input type="text" id="url-pesmi" placeholder="Povezava do pesmi (YouTube)">
  <button onclick="posljiZeljo()">Pošlji glasbeno željo</button>
</div>

<script>
async function preveriKodo() {
  const koda = document.getElementById('vip-koda').value;
  // Tukaj preveriš kodo s svojim strežnikom
  const response = await fetch('/api/preveri-kodo', {
    method: 'POST',
    body: JSON.stringify({ koda: koda }),
    headers: { 'Content-Type': 'application/json' }
  });

  if (response.ok) {
    document.getElementById('vip-sekcija').style.display = 'none';
    document.getElementById('glasbena-zelja-sekcija').style.display = 'block';
  } else {
    alert("Koda je napačna ali pa je že bila uporabljena!");
  }
}
</script>
